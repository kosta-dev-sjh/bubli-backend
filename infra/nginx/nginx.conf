events {}

http {
# ============================================================
# HTTP → HTTPS redirect
# ============================================================
server {
    listen 80;
    server_name bubli.n-e.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS
# ============================================================
server {
    listen 443 ssl;
    server_name bubli.n-e.kr;

    ssl_certificate     /etc/letsencrypt/live/bubli.n-e.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bubli.n-e.kr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --------------------------------------------------------
    # WebSocket  /ws → Spring Boot (8080)
    # --------------------------------------------------------
    location /ws {
        proxy_pass         http://bubli-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --------------------------------------------------------
    # REST API  /api → Spring Boot (8080)
    # --------------------------------------------------------
    location /api {
        proxy_pass         http://bubli-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------
    # Frontend  / → Next.js (3000)
    # --------------------------------------------------------
    location / {
        proxy_pass         http://bubli-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
}
