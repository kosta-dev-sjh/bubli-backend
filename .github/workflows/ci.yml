name: CI

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: bubli_test
          POSTGRES_USER: bubli
          POSTGRES_PASSWORD: bubli1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bubli"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build -x test

      - name: Test
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/bubli_test
          SPRING_DATASOURCE_USERNAME: bubli
          SPRING_DATASOURCE_PASSWORD: bubli1234
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-key-at-least-32-bytes-long
          JWT_ACCESS_TOKEN_EXPIRE_MS: 3600000
          JWT_REFRESH_TOKEN_EXPIRE_MS: 1209600000
        run: ./gradlew test
