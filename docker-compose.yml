services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bubli-postgres
    environment:
      POSTGRES_DB: bubli
      POSTGRES_USER: bubli
      POSTGRES_PASSWORD: bubli1234
    ports:
      - "5432:5432"
    volumes:
      - bubli-pg-data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bubli"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bubli-redis
    ports:
      - "6379:6379"
    volumes:
      - bubli-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bubli-pg-data:
  bubli-redis-data:
