spring:
  config:
    activate:
      on-profile: ai

  ai:
    model:
      chat: bedrock-converse
      embedding: bedrock-titan

    bedrock:
      aws:
        region: ${AWS_REGION:ap-northeast-2}
        timeout: ${BEDROCK_TIMEOUT:2m}
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
        session-token: ${AWS_SESSION_TOKEN:}

      converse:
        chat:
          options:
            model: ${BEDROCK_CHAT_MODEL_ID:apac.anthropic.claude-3-haiku-20240307-v1:0}
            temperature: ${BEDROCK_CHAT_TEMPERATURE:0.2}
            max-tokens: ${BEDROCK_CHAT_MAX_TOKENS:1200}

      titan:
        embedding:
          model: ${BEDROCK_EMBEDDING_MODEL_ID:amazon.titan-embed-text-v2:0}
          input-type: TEXT

    vectorstore:
      type: pgvector
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: ${BEDROCK_EMBEDDING_DIMENSIONS:1024}
        schema-name: public
        table-name: vector_store
        schema-validation: false
        max-document-batch-size: 100

bubli:
  ai:
    retry:
      max-attempts: ${AI_RETRY_MAX_ATTEMPTS:3}
      initial-delay: ${AI_RETRY_INITIAL_DELAY:1s}
  rag:
    smoke:
      enabled: ${RAG_SMOKE_ENABLED:true}

agent:
  execution:
    mode: ${AGENT_EXECUTION_MODE:llm}
  dispatch:
    adapter: ${AGENT_DISPATCH_ADAPTER:redis}
    redis:
      queue-key: ${AGENT_REDIS_QUEUE_KEY:bubli:agent-jobs}
    worker:
      scheduler:
        enabled: ${AGENT_WORKER_SCHEDULER_ENABLED:true}
        fixed-delay-ms: ${AGENT_WORKER_SCHEDULER_FIXED_DELAY_MS:1000}
      max-jobs-per-tick: ${AGENT_WORKER_MAX_JOBS_PER_TICK:5}
    outbox:
      scheduler:
        enabled: ${AGENT_OUTBOX_SCHEDULER_ENABLED:true}
        fixed-delay-ms: ${AGENT_OUTBOX_SCHEDULER_FIXED_DELAY_MS:5000}
      max-retry-count: ${AGENT_OUTBOX_MAX_RETRY_COUNT:3}
    retry:
      scheduler:
        enabled: ${AGENT_RETRY_SCHEDULER_ENABLED:true}
        fixed-delay-ms: ${AGENT_RETRY_SCHEDULER_FIXED_DELAY_MS:60000}
      max-retry-count: ${AGENT_JOB_MAX_RETRY_COUNT:3}
