services:
  backend:
    image: ${DOCKER_USERNAME}/bubli-backend:latest
    container_name: bubli-backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${RDS_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${RDS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    depends_on:
      - redis
    expose:
      - "8080"
    networks:
      - bubli-network
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  redis:
    image: redis:7-alpine
    container_name: bubli-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - bubli-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m

  frontend:
    image: ${DOCKER_USERNAME}/bubli-frontend:latest
    container_name: bubli-frontend
    restart: always
    expose:
      - "3000"
    networks:
      - bubli-network
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  nginx:
    image: nginx:alpine
    container_name: bubli-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - bubli-network
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m

  certbot:
    image: certbot/certbot
    container_name: bubli-certbot
    restart: always
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit 0 SIGTERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    deploy:
      resources:
        limits:
          memory: 64m

  prometheus:
    image: prom/prometheus:latest
    container_name: bubli-prometheus
    restart: always
    expose:
      - "9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - bubli-network
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  grafana:
    image: grafana/grafana:latest
    container_name: bubli-grafana
    restart: always
    expose:
      - "3001"
    environment:
      - GF_SERVER_HTTP_PORT=3001
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - bubli-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

volumes:
  redis-data:
  certbot-etc:
  certbot-var:
  webroot:
  prometheus-data:
  grafana-data:

networks:
  bubli-network:
    driver: bridge
